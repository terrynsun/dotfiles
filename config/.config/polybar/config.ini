[colors]
; base02
background = #073642
base01 = #586e75
base00 = #657b83
base3 = #fdf6e3
base2 = #eee8d5
base1 = #93a1a1
; base1
foreground = #93a1a1

; yellow
primary = #b58900

yellow = #b58900
fadedyellow = #b8a772
orange = #cb4b16
violet = #6c71c4
cyan = #2aa198

; red
alert = #dc322f
; base01
disabled = #586e75

[bar/primary]
width = 100%
height = 46px

; radius = 6
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = ${colors.background}

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.base2}

font-0 = DejaVu Sans:size=20;3
font-1 = Noto Sans CJK SC Medium:size=20
font-2 = Noto Emoji:pixelsize=20:scale=10;3

modules-left = i3
modules-right = playerctl headphones pulseaudio battery filesystem memory cpu temperature wlan date tray

; cursor-click = pointer
; cursor-scroll = ns-resize

enable-ipc = true

format-margin = 8pt

; wm-restack = i3
; override-redirect = true

[bar/secondary]
inherit = bar/primary
monitor = ${env:MONITOR:eDP1}

width = 100%
height = 46px
override-redirect = false
modules-right = playerctl pulseaudio battery date

[module/tray]
type = internal/tray
format = <tray>
tray-padding = 3

[module/i3]
type = internal/i3
pin-workspaces = true

label-focused = %name%
label-focused-background = ${colors.base01}
label-focused-foreground = ${colors.base2}
label-focused-underline= ${colors.primary}
label-focused-padding = 1

label-visible = %name%
label-visible-underline = ${colors.fadedyellow}
label-visible-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-urgent = %name%
label-urgent-padding = 1

label-mode-padding = 1

label-separator = |
label-separator-padding = 1

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#b58900}%mountpoint%%{F-} %percentage_used%% ‚Äď %free%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
low-at = 20

time-format = "%H:%M"

label-charging = %{F#859900}%percentage%% %{F-}%time%
label-charging-foreground = ${colors.foreground}
label-discharging = %{F#b58900}%percentage%% %{F-}%time%

label-full = full
label-full-foreground = ${colors.disabled}
label-low = %{F#dc322f}%percentage%% %{F-}%time%

[module/backlight]
type = internal/backlight
card = intel_backlight

[module/headphones]
type = custom/script
exec = echo ūüéß
exec-if = pamixer --get-default-sink | grep -v 'Default sink' | grep -v 'Built-in'

format-font = 2

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/playerctl]
type = custom/script
exec = polybar-playerctl
exec-if = playerctl status 2>&1 | grep -Ev 'No players found|Stopped'
click-left = playerctl play-pause
interval = 1

fomat-fail = <label-fail>
label-fail = 'none'

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

warn-percentage = 75
format-warn = <label-warn>
;label-warn = %{F#cb4b16}%percentage%%
label-warn = %{F#b58900}RAM %{F#cb4b16}%percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

warn-percentage = 75
format-warn = <label-warn>
label-warn = %{F#b58900}CPU %{F#cb4b16}%percentage:2%%

[module/temperature]
type = internal/temperature

warn-temperature = 10

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#b58900}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface = wlp0s20f3
interface-type = wireless
label-connected = %{F#b58900}%essid%%{F-}

label-disconnected = no network
label-disconnected-foreground = ${colors.alert}

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%essid%%{F-}
;label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/time-utc]
type = custom/script
exec = TZ=UTC date +"%Y-%m-%d %H:%M UTC"
interval = 5

[module/date]
type = internal/date
interval = 5

date = %a %Y-%m-%d %I:%M
date-alt = %a %Y-%m-%d %I:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
